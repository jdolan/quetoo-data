name: Publish

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Write manifest
      run: make manifest

    - name: Commit manifest
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add target/default/manifest.mf
        git diff --staged --quiet || git commit -m "Update manifest.mf [skip ci]"
        git push

    - name: Publish to S3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
      run: aws s3 sync --delete target/ s3://quetoo-data

    - name: Build packages
      run: |
        sudo gem install fpm --no-document
        make -C linux deb rpm

    - name: Publish latest snapshot release
      run: |
        gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        gh release create latest \
          --prerelease \
          --title "Latest Snapshot" \
          --notes "Latest game data snapshot, built from \`main\` at $(git rev-parse --short HEAD)." \
          linux/target/quetoo-data_*_all.deb \
          linux/target/quetoo-data-*.noarch.rpm
      env:
        GH_TOKEN: ${{ github.token }}
