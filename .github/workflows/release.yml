name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Write manifest
      run: make manifest

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Publish to S3
      run: aws s3 sync --delete target/ s3://quetoo-data

    - name: Build packages
      run: |
        sudo gem install fpm --no-document
        make -C linux deb rpm VERSION=${GITHUB_REF_NAME#v}

    - name: Create release
      run: |
        gh release create ${{ github.ref_name }} \
          --title "Quetoo Data ${{ github.ref_name }}" \
          --notes "Game data package for Quetoo ${{ github.ref_name }}." \
          linux/target/quetoo-data_*_all.deb \
          linux/target/quetoo-data-*.noarch.rpm
      env:
        GH_TOKEN: ${{ github.token }}
